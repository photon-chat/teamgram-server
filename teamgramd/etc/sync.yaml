Name: messenger.sync
ListenOn: 127.0.0.1:20420
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: messenger.sync
Log:
  Mode: file
  Path: ../logs/sync
  Level: debug

SyncConsumer:
  Topics:
    - "Sync-T"
  Brokers:
    - 127.0.0.1:9092
  Group: "Sync-MainCommunity-S"

Routine:
  Chan: 16
  Size: 100

Mysql:
  DSN: root:@tcp(127.0.0.1:3306)/teamgram?charset=utf8mb4&parseTime=true
  Active: 64
  Idle: 64
  IdleTimeout: 4h
Cache:
  - Host: 127.0.0.1:6379
KV:
  - Host: 127.0.0.1:6379

IdgenClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.idgen
StatusClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.status
SessionClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: interface.session

ChannelClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.biz_service
ChatClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.biz_service
UserClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.biz_service

PushClient:
  Topic:   "Push-T"
  Brokers:
    - 127.0.0.1:9092

# APNs 推送配置（由 Docker 环境变量自动注入，无需手动修改）
# 开发环境: docker-compose.yaml (Production: false)
