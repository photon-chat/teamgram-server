syntax = "proto3";

package user_password;

option go_package = "github.com/teamgram/teamgram-server/app/service/biz/user/user_password";

// 用户密码服务（供 BFF 层调用）
service UserPasswordService {
    // 保存用户密码哈希
    rpc SaveUserPassword(SaveUserPasswordReq) returns (SaveUserPasswordResp);

    // 按 user_id 获取密码哈希
    rpc GetUserPassword(GetUserPasswordReq) returns (GetUserPasswordResp);

    // 按手机号获取 user_id + 密码哈希
    rpc GetUserPasswordByPhone(GetUserPasswordByPhoneReq) returns (GetUserPasswordByPhoneResp);
}

message SaveUserPasswordReq {
    int64 user_id = 1;
    string password_hash = 2;
}

message SaveUserPasswordResp {}

message GetUserPasswordReq {
    int64 user_id = 1;
}

message GetUserPasswordResp {
    string password_hash = 1;
}

message GetUserPasswordByPhoneReq {
    string phone = 1;
}

message GetUserPasswordByPhoneResp {
    int64 user_id = 1;
    string password_hash = 2;
}
