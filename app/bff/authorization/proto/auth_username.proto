syntax = "proto3";

package auth_username;

option go_package = "github.com/teamgram/teamgram-server/app/bff/authorization/auth_username";

// ====== 自定义认证服务 ======

service AuthUsernameService {
    // 获取支持的认证方式列表
    rpc GetAuthMethods(GetAuthMethodsReq) returns (GetAuthMethodsResp);

    // 检查用户名是否可用
    rpc CheckUsernameAvailable(CheckUsernameAvailableReq) returns (CheckUsernameAvailableResp);

    // 用户名+密码注册
    rpc UsernameRegister(UsernameRegisterReq) returns (AuthResp);

    // 用户名+密码登录
    rpc UsernameSignIn(UsernameSignInReq) returns (AuthResp);

    // 手机号+密码注册
    rpc PhonePasswordRegister(PhonePasswordRegisterReq) returns (AuthResp);

    // 手机号+密码登录
    rpc PhonePasswordSignIn(PhonePasswordSignInReq) returns (AuthResp);
}

// ====== 请求/响应 ======

message GetAuthMethodsReq {}

message GetAuthMethodsResp {
    repeated string auth_methods = 1; // 如 ["username_password", "phone_sms_code", "phone_password"]
}

message CheckUsernameAvailableReq {
    string username = 1;
}

message CheckUsernameAvailableResp {
    bool available = 1;
}

message UsernameRegisterReq {
    string username = 1;
    string password = 2;
    string first_name = 3;
    string last_name = 4;
}

message UsernameSignInReq {
    string username = 1;
    string password = 2;
}

message PhonePasswordRegisterReq {
    string phone = 1;
    string password = 2;
    string first_name = 3;
    string last_name = 4;
}

message PhonePasswordSignInReq {
    string phone = 1;
    string password = 2;
}

// 认证响应（所有认证方式共用）
message AuthResp {
    int64 user_id = 1;
    string username = 2;
    string phone = 3;
    string first_name = 4;
    string last_name = 5;
    // MTProto auth_key，客户端用此密钥建立 MTProto 连接
    bytes auth_key = 6;
    int64 auth_key_id = 7;
}
