# 生产环境配置（host 网络，仅用于原生 Linux 服务器）
# 使用方式：
#   1. 先启动环境服务：docker-compose -f docker-compose-env.prod.yaml up -d
#   2. 再启动应用：docker-compose -f docker-compose.prod.yaml build && docker-compose -f docker-compose.prod.yaml up -d
#
# 注意：生产环境必须使用 docker-compose-env.prod.yaml（不是 docker-compose-env.yaml）
#       因为 teamgram 容器使用 host 网络模式，无法通过 Docker DNS 解析容器名，
#       所以 etcd/kafka 的 advertise 地址必须用 127.0.0.1 而非容器名。
#
# 效果：
#   - teamgram 容器使用 host 网络模式，Gateway 可获取真实客户端 IP
#   - 环境变量指向 127.0.0.1（host 模式下直接访问宿主机端口）
#   - 必须配合 ufw 防火墙使用（见 docs/deployment.md）

version: "3"

services:
  teamgram:
    build: .
    restart: always
    network_mode: host
    environment:
      ETCD_URL: "127.0.0.1:2379"
      REDIS_HOST: "127.0.0.1:6379"
      KAFKA_HOST: "127.0.0.1:9092"
      MYSQL_URI: "teamgram:${DB_PASSWORD:-teamgram}@tcp(127.0.0.1:3306)/teamgram?charset=utf8mb4"
      STICKERS_MYSQL_URI: "teamgram:${DB_PASSWORD:-teamgram}@tcp(127.0.0.1:3306)/teamgram_stickers?charset=utf8mb4&parseTime=true"
      MINIO_URI: "127.0.0.1:9000"
    mem_limit: 1280m
